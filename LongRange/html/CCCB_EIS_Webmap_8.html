<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CCCB EIS Cumulative Projects — Visual Analysis Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Esri Leaflet (for ArcGIS feature/map services) -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

<!-- Leaflet Control Layers -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

  #map { width: 100vw; height: 100vh; }

  /* Top bar */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(20, 40, 60, 0.92);
    backdrop-filter: blur(6px);
    color: #fff;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  #topbar h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  #topbar span {
    font-size: 12px;
    opacity: 0.65;
    white-space: nowrap;
  }

  /* Legend */
  #legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    z-index: 1000;
    background: rgba(255,255,255,0.97);
    border-radius: 8px;
    padding: 14px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    font-size: 12.5px;
    min-width: 200px;
    border: 1px solid #dde3ea;
  }
  #legend h3 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #1a2e44;
    border-bottom: 1px solid #e0e7ef;
    padding-bottom: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 9px;
    margin: 6px 0;
    color: #2c3e50;
  }
  .legend-swatch {
    width: 20px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1.5px solid rgba(0,0,0,0.25);
  }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.3);
  }

  /* Status bar */
  #status {
    position: absolute;
    bottom: 30px;
    left: 50px;
    z-index: 1000;
    background: rgba(255,255,255,0.92);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: #555;
    box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    display: none;
  }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.25);
  }
  .popup-title {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 4px;
    color: #1a2e44;
  }
  .popup-row {
    font-size: 12px;
    color: #444;
    margin: 2px 0;
  }
  .popup-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }
  .badge-red { background: #fee2e2; color: #b91c1c; }
  .badge-yellow { background: #fef9c3; color: #92400e; }
  .badge-blue { background: #dbeafe; color: #1d4ed8; }
</style>
</head>
<body>

<div id="topbar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
  <h1>CCCB EIS Cumulative Projects — Visual Analysis</h1>
  <span>Scenic Viewpoints · Town Center Boundaries · Parcels · Lake Tahoe Basin</span>
</div>

<div id="map"></div>

<div id="legend">
  <h3>Map Legend</h3>
  <div class="legend-item">
    <div class="legend-dot" style="background:#ef4444; border-color:#b91c1c;"></div>
    <span>Scenic Viewpoints (EIS — IDs 36.1, 32.3, 20.2, 22.3, 35.1)</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#78a; border-color:#556;"></div>
    <span>Other Scenic Viewpoints</span>
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background:rgba(255,215,0,0.55); border-color:#b8860b;"></div>
    <span>Highlighted Parcels — Visual Tab (by APN)</span>
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background:rgba(100,160,220,0.15); border-color:#2980b9;"></div>
    <span>Town Center Boundaries</span>
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background:rgba(180,180,180,0.12); border-color:#888;"></div>
    <span>Parcels (all)</span>
  </div>
</div>

<div id="status" id="status"></div>

<script>
// ─── Map init ────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [38.96, -119.98],
  zoom: 12,
  zoomControl: true
});

// Base tile layers
const esriTopo = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Esri, HERE, Garmin, USGS', maxZoom: 20 }
);
const esriImagery = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Esri, Maxar, GeoEye', maxZoom: 20 }
);
const esriStreets = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Esri, HERE', maxZoom: 20 }
);
esriTopo.addTo(map);

// ─── Data ────────────────────────────────────────────────────────────────────

// APNs to highlight in yellow (from Visual tab)
const highlightedAPNs = [
  '034-331-023','034-331-015','034-270-059','034-270-063',
  '1318-27-001-010','1318-27-001-009',
  '027-750-015','027-072-033',
  '090-142-001','090-142-002',
  '090-133-015','090-133-011','090-133-019','090-133-009',
  '090-133-008','090-133-007','090-133-006','090-133-005','090-133-003',
  '090-133-016','090-133-021',
  '090-370-006','090-370-005',
  '090-221-012','090-221-027','090-221-026','090-221-018','090-221-021','090-221-020',
  '132-240-07','132-240-19','132-201-02',
  '023-081-011','023-231-003'
];

// Highlighted viewpoint IDs
const highlightedVPs = new Set(["36.1-roadway", "32.3-roadway", "20.2-roadway", "22.3-roadway", "35.1-roadway"]);

// ─── Parcel layer (all parcels, subtle) ──────────────────────────────────────
const parcelLayer = L.esri.dynamicMapLayer({
  url: 'https://maps.trpa.org/server/rest/services/Parcels/MapServer',
  layers: [0],
  opacity: 0.4,
  f: 'image'
});
parcelLayer.addTo(map);

// ─── Town Centers (Boundaries/FeatureServer/1) ────────────────────────────────
const townCenterLayer = L.esri.featureLayer({
  url: 'https://maps.trpa.org/server/rest/services/Boundaries/FeatureServer/1',
  style: function() {
    return {
      color: '#2980b9',
      weight: 2.5,
      opacity: 0.9,
      fillColor: '#64a0dc',
      fillOpacity: 0.12
    };
  },
  onEachFeature: function(feature, layer) {
    const p = feature.properties;
    const name = p.Name || 'Town Center';
    const desc = p.Description ? ` — ${p.Description}` : '';
    layer.bindPopup(
      `<div class="popup-title">🏙️ ${name}${desc}</div>
       <div class="popup-row"><b>Jurisdiction:</b> ${p.Jurisdiction || 'N/A'}</div>
       <div class="popup-row"><b>District #:</b> ${p.District_Number || 'N/A'}</div>
       <div class="popup-row"><b>Land Use:</b> ${p.Land_Use || 'N/A'}</div>
       <div class="popup-row"><b>Acres:</b> ${p.Acres ? p.Acres.toFixed(1) : 'N/A'}</div>
       <span class="popup-badge badge-blue">Town Center</span>`
    );
  }
});
townCenterLayer.addTo(map);

// ─── Scenic Viewpoints ───────────────────────────────────────────────────────
const vpLayer = L.esri.featureLayer({
  url: 'https://maps.trpa.org/server/rest/services/LTInfo_Monitoring/MapServer/24',
  pointToLayer: function(feature, latlng) {
    const vpId = String(feature.properties.id || feature.properties.ID || '');
    const isHighlighted = highlightedVPs.has(vpId);
    return L.circleMarker(latlng, {
      radius: isHighlighted ? 10 : 6,
      fillColor: isHighlighted ? '#ef4444' : '#7a8c9a',
      color: isHighlighted ? '#7f1d1d' : '#445566',
      weight: isHighlighted ? 2.5 : 1.5,
      opacity: 1,
      fillOpacity: isHighlighted ? 0.92 : 0.65,
      zIndexOffset: isHighlighted ? 1000 : 0
    });
  },
  onEachFeature: function(feature, layer) {
    const p = feature.properties;
    const vpId = String(p.id || p.ID || '');
    const isHighlighted = highlightedVPs.has(vpId);
    const vpIdDisplay = vpId.replace('-roadway', '');
    const badge = isHighlighted
      ? '<span class="popup-badge badge-red">⚑ EIS Highlighted</span>'
      : '<span class="popup-badge badge-blue">Scenic Viewpoint</span>';
    layer.bindPopup(
      `<div class="popup-title">📸 Scenic Viewpoint ${vpIdDisplay}</div>
       <div class="popup-row"><b>Road:</b> ${p.road_name || p.ROAD_NAME || p.road || 'N/A'}</div>
       <div class="popup-row"><b>Location:</b> ${p.location || p.LOCATION || 'N/A'}</div>
       ${badge}`
    );
    if (isHighlighted) {
      layer.on('mouseover', function() { this.openPopup(); });
    }
  }
});
vpLayer.addTo(map);

// ─── Yellow Parcel Highlights by APN (polygon query) ─────────────────────────
const apnHighlightGroup = L.layerGroup();
apnHighlightGroup.addTo(map);

// Build WHERE clause using confirmed FeatureServer/0 with APN field (length 16)
const apnList = highlightedAPNs.map(a => `'${a}'`).join(',');
const whereClause = `APN IN (${apnList})`;
const featureServerUrl = 'https://maps.trpa.org/server/rest/services/Parcels/FeatureServer/0';
const queryUrl = `${featureServerUrl}/query?where=${encodeURIComponent(whereClause)}&outFields=APN,APO_ADDRESS,STR_NAME,PSTL_TOWN,JURISDICTION,COUNTY,EXISTING_LANDUSE,OWNERSHIP_TYPE&returnGeometry=true&outSR=4326&f=geojson`;

fetch(queryUrl)
  .then(r => r.json())
  .then(data => {
    if (!data.features || data.features.length === 0) {
      console.warn('No parcel features returned from FeatureServer.');
      return;
    }
    console.log(`Loaded ${data.features.length} highlighted parcels.`);
    L.geoJSON(data, {
      style: {
        color: '#b8860b',
        weight: 2.5,
        opacity: 1,
        fillColor: '#FFD700',
        fillOpacity: 0.6
      },
      onEachFeature: function(feature, layer) {
        const p = feature.properties;
        layer.bindPopup(
          `<div class="popup-title">📦 APN: ${p.APN || 'N/A'}</div>
           <div class="popup-row"><b>Address:</b> ${p.APO_ADDRESS || 'N/A'}</div>
           <div class="popup-row"><b>Town:</b> ${p.PSTL_TOWN || 'N/A'}</div>
           <div class="popup-row"><b>Jurisdiction:</b> ${p.JURISDICTION || 'N/A'}</div>
           <div class="popup-row"><b>Land Use:</b> ${p.EXISTING_LANDUSE || 'N/A'}</div>
           <span class="popup-badge badge-yellow">Highlighted Parcel (Visual Tab)</span>`
        );
      }
    }).addTo(apnHighlightGroup);
  })
  .catch(err => console.error('Parcel FeatureServer query failed:', err));

// ─── Layer controls ───────────────────────────────────────────────────────────
const baseMaps = {
  "Topo": esriTopo,
  "Imagery": esriImagery,
  "Streets": esriStreets
};
const overlays = {
  "Parcels (all)": parcelLayer,
  "Town Centers": townCenterLayer,
  "Scenic Viewpoints": vpLayer,
  "Highlighted Parcels (Visual Tab)": apnHighlightGroup
};
L.control.layers(baseMaps, overlays, { position: 'topleft', collapsed: false }).addTo(map);

// ─── Scale bar ────────────────────────────────────────────────────────────────
L.control.scale({ imperial: true, metric: true }).addTo(map);
</script>
</body>
</html>
